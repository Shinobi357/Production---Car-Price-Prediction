<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Car Price Prediction</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>
    <main class="page-container">
        <section class="prediction-card">
            <header>
                <p class="eyebrow">Machine Learning Application</p>
                <h1>Car Price Prediction</h1>
                <p class="description">
                    Enter the vehicle information below to estimate its price.
                </p>
            </header>

            {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
            {% endif %}

            <form action="/predict_form" method="POST">
                <div class="form-grid">

                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input
                            id="brand"
                            name="Brand"
                            type="text"
                            placeholder="Toyota"
                            value="{{ submitted['Brand'] if submitted else '' }}"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="model">Model</label>
                        <input
                            id="model"
                            name="Model"
                            type="text"
                            placeholder="Camry"
                            value="{{ submitted['Model'] if submitted else '' }}"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="year">Year</label>
                        <input
                            id="year"
                            name="Year"
                            type="number"
                            min="1900"
                            max="2035"
                            placeholder="2020"
                            value="{{ submitted['Year'] if submitted else '' }}"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="engine-size">Engine Size</label>
                        <input
                            id="engine-size"
                            name="Engine Size"
                            type="number"
                            step="0.1"
                            min="0.1"
                            placeholder="2.5"
                            value="{{ submitted['Engine Size'] if submitted else '' }}"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="fuel-type">Fuel Type</label>
                        <select
                            id="fuel-type"
                            name="Fuel Type"
                            required
                        >
                            <option value="">Select fuel type</option>
                            <option value="Petrol">Petrol</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="transmission">Transmission</label>
                        <select
                            id="transmission"
                            name="Transmission"
                            required
                        >
                            <option value="">Select transmission</option>
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mileage">Mileage</label>
                        <input
                            id="mileage"
                            name="Mileage"
                            type="number"
                            min="0"
                            step="1"
                            placeholder="35000"
                            value="{{ submitted['Mileage'] if submitted else '' }}"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="condition">Condition</label>
                        <select
                            id="condition"
                            name="Condition"
                            required
                        >
                            <option value="">Select condition</option>
                            <option value="New">New</option>
                            <option value="Used">Used</option>
                            <option value="Like New">Like New</option>
                            <option value="Excellent">Excellent</option>
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                        </select>
                    </div>

                </div>

                <button type="submit">
                    Predict Vehicle Price
                </button>
            </form>

            {% if prediction %}
            <section class="result-box">
                <p>Estimated Vehicle Price</p>
                <h2>{{ prediction }}</h2>
                <span>
                    This estimate was generated by the trained machine learning model.
                </span>
            </section>
            {% endif %}
        </section>
    </main>
</body>
</html>
